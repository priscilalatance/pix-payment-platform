services:
  postgres-comprovantes:
    image: postgres:15-alpine
    container_name: postgres-comprovantes
    environment:
      POSTGRES_DB: db_comprovantes
      POSTGRES_USER: comprovantes
      POSTGRES_PASSWORD: comprovantes123
    ports:
      - "5433:5432"
    volumes:
      - pgdata-comprovantes:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis-comprovantes
    ports:
      - "6379:6379"

  # RabbitMQ compartilhado com o ms-pagamento (saga.exchange).
  # Em execucao integrada com o ms-pagamento, suba apenas UM RabbitMQ.
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  # Kafka single-node em modo KRaft (sem Zookeeper).
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

volumes:
  pgdata-comprovantes:
