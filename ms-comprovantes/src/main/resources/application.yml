server:
  port: 8081

spring:
  application:
    name: ms-comprovantes
  datasource:
    url: jdbc:postgresql://localhost:5433/db_comprovantes
    driver-class-name: org.postgresql.Driver
    username: comprovantes
    password: comprovantes123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

app:
  cache:
    comprovante:
      ttl-minutes: 10
  consulta:
    max-tentativas: 3
    delay-ms: 300
