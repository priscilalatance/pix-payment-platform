services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # KRaft (sem Zookeeper): este no acumula os papeis de broker e controller.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres-pagamento:
    image: postgres:15-alpine
    container_name: postgres-pagamento
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_pagamento
      POSTGRES_USER: pagamento
      POSTGRES_PASSWORD: pagamento123
    ports:
      - "5432:5432"
    volumes:
      - pgdata-pagamento:/var/lib/postgresql/data

  postgres-comprovantes:
    image: postgres:15-alpine
    container_name: postgres-comprovantes
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_comprovantes
      POSTGRES_USER: comprovantes
      POSTGRES_PASSWORD: comprovantes123
    ports:
      - "5433:5432"
    volumes:
      - pgdata-comprovantes:/var/lib/postgresql/data

  postgres-notificacao:
    image: postgres:15-alpine
    container_name: postgres-notificacao
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_notificacao
      POSTGRES_USER: notificacao
      POSTGRES_PASSWORD: notificacao123
    ports:
      - "5434:5432"
    volumes:
      - pgdata-notificacao:/var/lib/postgresql/data

volumes:
  pgdata-pagamento:
  pgdata-comprovantes:
  pgdata-notificacao:
